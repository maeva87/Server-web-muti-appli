version: '3.8'
services:
  reverse-proxy:
    image: nginx:stable
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app-node
      - app-static

  app-node:
    build: ./app-node
    restart: unless-stopped
    environment:
      - PORT=3000

  app-static:
    image: nginx:stable
    volumes:
      - ./app-static:/usr/share/nginx/html:ro
    restart: unless-stopped
